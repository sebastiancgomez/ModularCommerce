- name: Login to ACR
  run: |
    echo "${{ secrets.AZURE_ACR_PASSWORD }}" | docker login ${{ secrets.AZURE_ACR_LOGIN_SERVER }} -u ${{ secrets.AZURE_ACR_USERNAME }} --password-stdin

- name: Build image
  run: |
    docker build \
      -t ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/modularcommerce-api:${{ github.sha }} \
      -t ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/modularcommerce-api:latest \
      -f src/ModularCommerce.Api/Dockerfile .

- name: Push image
  run: |
    docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/modularcommerce-api:${{ github.sha }}
    docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/modularcommerce-api:latest