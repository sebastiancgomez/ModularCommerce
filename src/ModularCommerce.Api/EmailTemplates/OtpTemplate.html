<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #fbe3e3;
            
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #fdf1f1;
            border-radius: 8px;
            overflow: hidden;
            font-family: sans-serif;
            border: 1px solid #ad8a1f
        }
        .header {
            background-color: #fdf1f1;
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid #ad8a1f;
        }
            .header h1 {
                color: #9b7dc4;
                margin: 0;
                text-transform: uppercase;
            }
            .header span {
                color: #4a4e8c;
            }
        .content {
            padding: 40px;
            text-align: center;
            color: #9b7dc4;
        }
        .code-box {
            display: inline-block;
            margin: 30px 0;
            padding: 20px 40px;
            background-color: #9b7dc4;
            color: #FFFFFF;
            font-size: 32px;
            font-weight: bold;
            border-radius: 5px;
        }
        .footer {
            background-color: #fdf1f1;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666666;
            border-top: 1px solid #ad8a1f
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>Mis <span>Bellas</span></h1></div>
        <div class="content">
            <h2>C&oacute;digo de Verificaci&oacute;n</h2>
            <p>&iexcl;Hola! Gracias por ser una de <strong>Mis Bellas</strong>. Estamos felices de acompa&ntilde;arte.</p>
            
            <p>{OTP_MESSAGE}</p>
    
            <div class="code-box">
                {OTP_CODE}
            </div>

            <p style="font-size: 13px;">Este c&oacute;digo expirar&aacute; en 10 minutos por tu seguridad.</p>
            <p style="font-size: 12px; color: #888;">Si no solicitaste este correo, puedes ignorarlo.</p>
        </div>
        <div class="footer">&copy; 2026 Mis Bellas.</div>
    </div>
</body>
</html>
